# PDFHorse — nginx snippet voor HC55.
# Insert in main server-block voor horsecloud55.ddns.net (server 443 ssl).
# Behoud ALLE bestaande location-blocks elders (shared infra, P-TECH-04).
#
# Belangrijk: het horsecloud-server-block heeft een server-level
# `auth_basic "HorseCloud"` directive. PDFHorse is een PUBLIEKE anonieme
# tool — alle locations hieronder moeten daarom `auth_basic off;` zetten,
# zelfde patroon als snippets/horsesafe.conf.

# Static frontend onder /PDFHorse/
location /PDFHorse/ {
    auth_basic off;
    alias /var/www/pdfhorse/frontend/;
    try_files $uri $uri/ /PDFHorse/index.html;

    # Geen sensitive caching voor HTML
    location ~ \.html$ {
        auth_basic off;
        add_header Cache-Control "no-cache, must-revalidate";
    }
    # Aggressive caching voor static assets
    location ~* \.(css|js|svg|png|webp)$ {
        auth_basic off;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

# Backend API onder /PDFHorse/api/
location /PDFHorse/api/ {
    auth_basic off;
    proxy_pass http://127.0.0.1:3963/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Upload size matched backend MAX_UPLOAD_SIZE_BYTES (50MB) met marge
    client_max_body_size 55m;

    # OCR-job kan even duren
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;

    # Privacy: geen access-log met PII/filenames
    access_log off;
}

# Redirect /PDFHorse → /PDFHorse/
location = /PDFHorse {
    auth_basic off;
    return 301 /PDFHorse/;
}

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" width="400" height="480"
     role="img" aria-labelledby="ph5-title ph5-desc">
  <title id="ph5-title">PDFHorse — Connecting the Dots</title>
  <desc id="ph5-desc">PDFHorse logo v5 — strakke presentatie van P, D en F als monoline letterformen waar de hoekpunten markante vertex-dots zijn in het Facturatie-palet (geel, blauw, groen), expliciet verbonden door drie threads die het "connecting the dots"-principe materialiseren.</desc>

  <defs>
    <radialGradient id="ph5-halo" cx="0.5" cy="0.42" r="0.65">
      <stop offset="0%"   stop-color="#59c5a8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#59c5a8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="ph5-dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1" fill="#59c5a8" fill-opacity="0.06"/>
    </pattern>
    <radialGradient id="ph5-glow-y" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#ffcd26" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffcd26" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ph5-glow-b" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#25a6ca" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#25a6ca" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ph5-glow-g" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#41a36b" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#41a36b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Badge -->
  <rect x="10" y="10" width="380" height="380" rx="48" fill="#070b14"/>
  <rect x="10" y="10" width="380" height="380" rx="48" fill="url(#ph5-dots)"/>
  <rect x="10" y="10" width="380" height="380" rx="48" fill="url(#ph5-halo)"/>
  <rect x="10" y="10" width="380" height="380" rx="48" fill="none"
        stroke="#178384" stroke-opacity="0.45" stroke-width="1.5"/>

  <!-- ========= CONNECTION THREADS (subtle, sage dashed) ========= -->
  <!-- Top thread: links all 3 blue dots -->
  <line x1="48" y1="160" x2="352" y2="160"
        stroke="#d5d9c9" stroke-width="1" stroke-opacity="0.55"
        stroke-dasharray="2 6" stroke-linecap="round"/>
  <!-- Bottom thread: links all 3 green dots -->
  <line x1="48" y1="300" x2="352" y2="300"
        stroke="#d5d9c9" stroke-width="1" stroke-opacity="0.55"
        stroke-dasharray="2 6" stroke-linecap="round"/>

  <!-- Yellow accent thread: arcs through the 3 yellow accent dots -->
  <path d="M 138 195 Q 195 222, 240 230 T 320 160"
        stroke="#54c3b1" stroke-width="1.2" fill="none"
        stroke-opacity="0.65" stroke-linecap="round"
        stroke-dasharray="3 4"/>

  <!-- ========= GLOW HALOS behind vertex dots ========= -->
  <g>
    <circle cx="75"  cy="160" r="11" fill="url(#ph5-glow-b)"/>
    <circle cx="165" cy="160" r="11" fill="url(#ph5-glow-b)"/>
    <circle cx="255" cy="160" r="11" fill="url(#ph5-glow-b)"/>
    <circle cx="138" cy="195" r="11" fill="url(#ph5-glow-y)"/>
    <circle cx="240" cy="230" r="11" fill="url(#ph5-glow-y)"/>
    <circle cx="320" cy="160" r="11" fill="url(#ph5-glow-y)"/>
    <circle cx="75"  cy="300" r="11" fill="url(#ph5-glow-g)"/>
    <circle cx="165" cy="300" r="11" fill="url(#ph5-glow-g)"/>
    <circle cx="255" cy="300" r="11" fill="url(#ph5-glow-g)"/>
  </g>

  <!-- ========= LETTERS (monoline, crisp teal, intro-stijl stroke) ========= -->
  <g fill="none" stroke="#54c3b1" stroke-width="3.6"
     stroke-linecap="round" stroke-linejoin="round"
     vector-effect="non-scaling-stroke">

    <!-- P : stem + bowl, single continuous path -->
    <path d="M 75 300 L 75 160 L 115 160 C 145 160, 145 230, 115 230 L 75 230"/>

    <!-- D : stem + curve, single continuous path -->
    <path d="M 165 300 L 165 160 L 200 160 C 250 160, 250 300, 200 300 L 165 300"/>

    <!-- F : stem + top arm + middle arm (3 strokes) -->
    <path d="M 255 300 L 255 160 L 320 160"/>
    <path d="M 255 220 L 305 220"/>
  </g>

  <!-- ========= VERTEX DOTS (the "connected dots") ========= -->
  <g>
    <!-- BLUE at top-left of each letter (the "starting dot") -->
    <circle cx="75"  cy="160" r="5.6" fill="#25a6ca"/>
    <circle cx="165" cy="160" r="5.6" fill="#25a6ca"/>
    <circle cx="255" cy="160" r="5.6" fill="#25a6ca"/>

    <!-- YELLOW at each letter's outer accent point -->
    <circle cx="138" cy="195" r="5.6" fill="#ffcd26"/>  <!-- P bowl outer -->
    <circle cx="240" cy="230" r="5.6" fill="#ffcd26"/>  <!-- D curve outer -->
    <circle cx="320" cy="160" r="5.6" fill="#ffcd26"/>  <!-- F top-arm tip -->

    <!-- GREEN at bottom-left of each letter (the "anchor dot") -->
    <circle cx="75"  cy="300" r="5.6" fill="#41a36b"/>
    <circle cx="165" cy="300" r="5.6" fill="#41a36b"/>
    <circle cx="255" cy="300" r="5.6" fill="#41a36b"/>

    <!-- Inner highlight pip on each dot for crisp punch -->
    <g fill="#ffffff" opacity="0.55">
      <circle cx="73"  cy="158" r="1.4"/>
      <circle cx="163" cy="158" r="1.4"/>
      <circle cx="253" cy="158" r="1.4"/>
      <circle cx="136" cy="193" r="1.4"/>
      <circle cx="238" cy="228" r="1.4"/>
      <circle cx="318" cy="158" r="1.4"/>
      <circle cx="73"  cy="298" r="1.4"/>
      <circle cx="163" cy="298" r="1.4"/>
      <circle cx="253" cy="298" r="1.4"/>
    </g>
  </g>

  <!-- Wordmark + tagline -->
  <g font-family="'Space Grotesk', system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
     font-weight="700" text-anchor="middle">
    <text x="200" y="446" font-size="40" letter-spacing="1.5">
      <tspan fill="#fa8f1a">PDF</tspan><tspan fill="#e5f4ed">Horse</tspan>
    </text>
    <text x="200" y="468" font-size="10" letter-spacing="4.5" fill="#54c3b1" opacity="0.8">
      CONNECTING  THE  DOTS
    </text>
  </g>
</svg>
